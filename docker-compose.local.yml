services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stroyka
      POSTGRES_USER: stroyka
      POSTGRES_PASSWORD: stroyka
    ports:
      - "5432:5432"
    volumes:
      - stroyka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stroyka -d stroyka"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "python -m pip install --upgrade pip &&
             pip install -r requirements.txt &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8001"
    environment:
      DB_NAME: stroyka
      DB_USER: stroyka
      DB_PASSWORD: stroyka
      DB_HOST: postgres
      DB_PORT: "5432"
      AUTH_SECRET: local-dev-change-me
      APP_PUBLIC_URL: http://localhost:3000
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  stroyka_postgres_data:
