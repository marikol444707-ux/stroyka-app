# Stroyka public-site API locations.
# Include these lines inside the active stroyka26.pro server {} block.
# Backend service is expected on 127.0.0.1:8001.
#
# If nginx reports "unknown limit_req zone", either add the limit_req_zone
# declarations from docs/ddos-and-ai-indexing.md to nginx.conf http {},
# or temporarily remove the limit_req lines below.

location = /site/leads {
    limit_req zone=lead_limit burst=5 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location = /site/lead-files {
    limit_req zone=lead_limit burst=10 nodelay;
    client_max_body_size 11m;
    proxy_pass http://127.0.0.1:8001;
}

location = /site/pricing {
    limit_req zone=lead_limit burst=20 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location = /site/projects {
    limit_req zone=lead_limit burst=20 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location = /site/publications {
    limit_req zone=lead_limit burst=20 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location ^~ /site-price-rules {
    limit_req zone=login_limit burst=20 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location ^~ /estimate-reconciliations {
    limit_req zone=login_limit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location ^~ /estimate-reconciliation-items {
    limit_req zone=login_limit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location ^~ /messenger-channels {
    limit_req zone=login_limit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location ^~ /messenger-outbox {
    limit_req zone=login_limit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8001;
}

location ^~ /marketing-publications {
    limit_req zone=login_limit burst=30 nodelay;
    proxy_pass http://127.0.0.1:8001;
}
